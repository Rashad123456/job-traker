<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <main class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">Job Application Tracker</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium">Total</p>
                <h2 id="total-count" class="text-3xl font-bold text-blue-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium">Interview</p>
                <h2 id="interview-count" class="text-3xl font-bold text-emerald-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <p class="text-slate-500 text-sm font-medium">Rejected</p>
                <h2 id="rejected-count" class="text-3xl font-bold text-red-500">0</h2>
            </div>
        </div>

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <div>
                <h3 class="text-xl font-bold text-slate-800">Available Jobs</h3>
                <div class="flex gap-2 mt-4">
                    <button onclick="switchTab('all')" id="tab-all" class="px-6 py-2 rounded-lg bg-blue-600 text-white font-medium transition-all cursor-pointer">All</button>
                    <button onclick="switchTab('interview')" id="tab-interview" class="px-6 py-2 rounded-lg bg-white text-slate-600 border border-slate-200 font-medium hover:bg-slate-50 transition-all cursor-pointer">Interview</button>
                    <button onclick="switchTab('rejected')" id="tab-rejected" class="px-6 py-2 rounded-lg bg-white text-slate-600 border border-slate-200 font-medium hover:bg-slate-50 transition-all cursor-pointer">Rejected</button>
                </div>
            </div>
            <div class="text-slate-500 font-medium">
                <span id="job-list-count">0</span> jobs
            </div>
        </div>

        <div id="jobs-container" class="grid grid-cols-1 gap-4">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
